{% extends "base.html" %}

{% block title %}
    ملخص الدفع
{% endblock %}

{% block content %}
<div class="py-6 md:w-1/2 md:mx-auto text-xl font-bold text-center">
    <h1>رصيد المحفظة</h1>
</div>


<div class="bg-white border border-gray-200 rounded shadow-sm p-6 md:w-1/2 md:mx-auto text-center space-y-4">
    <div class="flex justify-between">
        <p>{{package.name}}</p>
        <p>{{"%.2f"|format(package.price)}} د.ل</p>
    </div>
    <form method="POST" action="{{ url_for('payment.checkout', package_id=package.id) }}">
        <button type="submit" class="btn btn-neutral mt-6 w-full">دفع الآن</button>
        <a href="{{url_for('payment.payment_options')}}" class="btn mt-2 w-full">شحن المحفظة</a>
    </form>

</div>
{% endblock %}
