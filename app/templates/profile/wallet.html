{% extends "base.html" %}

{% block title %}
    المحفظة
{% endblock %}

{% block content %}
<div class="py-6 md:w-1/2 md:mx-auto text-xl font-bold text-center">
    <h1>رصيد المحفظة</h1>
</div>


<div class="bg-white border border-gray-200 rounded shadow-sm p-6 md:w-1/2 md:mx-auto text-center space-y-4">
    <h1>
        رصيدك الحالي
    </h1>
     <p class="text-2xl font-extrabold">{{ balance }} د.ل</p>
    <div>
        <a href="{{url_for('payment.payment_options')}}" class="btn btn-neutral mt-6 w-full">شحن المحفظة</a>
        <a href="{{url_for('main.prices')}}" class="btn mt-2 w-full">شراء باقة</a>
    </div>
</div>
{% endblock %}


{%block script%}
    {% if is_party %}
        <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
        <script>
        document.addEventListener("DOMContentLoaded", function () {
            confetti({
                particleCount: 150,
                spread: 90,
                origin: { y: 0.6 }
            });
            }, 300); // wait 300ms to make sure canvas is ready
        </script>
    {% endif %}

{%endblock%}
